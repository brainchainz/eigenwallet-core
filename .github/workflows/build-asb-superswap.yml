name: Build SuperSwap asb image

# Builds the patched asb (1% maker developer tip to the Monero SuperSwap wallet)
# and pushes it to ghcr.io/brainchainz/asb. The swap-asb/Dockerfile is
# self-contained (compiles Monero C++ + the Rust workspace), so no extra setup
# is needed beyond checking out the monero-sys submodule.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag"
        required: true
        default: "1pct"

jobs:
  docker:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push asb image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./swap-asb/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/brainchainz/asb:${{ github.event.inputs.tag }}
          # Registry layer cache so future rebuilds skip the Monero/Rust compile
          cache-from: type=registry,ref=ghcr.io/brainchainz/asb:buildcache
          cache-to: type=registry,ref=ghcr.io/brainchainz/asb:buildcache,mode=max
